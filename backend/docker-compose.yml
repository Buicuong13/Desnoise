name: denoise

services:
  postgres:
    image: postgres:16-alpine
    container_name: denoise_postgres
    environment:
      POSTGRES_USER: denoise
      POSTGRES_PASSWORD: denoise
      POSTGRES_DB: denoise_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U denoise -d denoise_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: denoise_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
